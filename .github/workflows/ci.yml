name: Klebsiella Phage CPG CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  scaffold-validation:
    name: Scaffold validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Compile workflow scripts
        run: python -m py_compile scripts/*.py

      - name: Run source export validator self-test
        run: >-
          python scripts/self_test_source_export_validation.py
          --output results/validation/source_export_validation_self_test.tsv
          --report-output results/validation/source_export_validation_self_test_report.tsv

      - name: Run source work-order acceptance self-test
        run: >-
          python scripts/self_test_source_work_order_acceptance.py
          --output results/validation/source_work_order_acceptance_self_test.tsv
          --report-output results/validation/source_work_order_acceptance_self_test_report.tsv

      - name: Run mock workflow
        run: python scripts/run_workflow.py --config config/workflow.mock.yaml

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: |
            results/mock/validation/
            results/validation/source_export_validation_self_test*.tsv
            results/validation/source_work_order_acceptance_self_test*.tsv
            logs/
          if-no-files-found: warn
