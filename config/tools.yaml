# Tool selections and paths for the Klebsiella phage CPG workflow.
# Keep external tool choices here rather than hard-coding them in scripts.

workflow:
  orchestrator: snakemake
  direct_runner: scripts/run_workflow.py
  direct_runner_config: config/workflow.yaml
  smoke_test_config: config/workflow.mock.yaml
  default_threads: 1

dataset_curation:
  source_audit_script: scripts/audit_source_catalog.py
  sample_builder_script: scripts/build_samples_from_sources.py
  source_catalog: config/source_catalog.yaml
  mock_source_catalog: config/source_catalog.mock.yaml
  manifest_script: scripts/00_build_phage_manifest.py

dereplication:
  dereplication_script: scripts/01_dereplicate_phages.py
  optional_pairwise_similarity_schema: docs/dereplication_schema.md

annotation_pangenome:
  annotation_script: scripts/02_build_annotation_tables.py
  optional_annotation_schema: docs/annotation_schema.md

rbp_depolymerase:
  candidate_script: scripts/03_predict_rbps_depolymerases.py
  candidate_schema: docs/rbp_depolymerase_schema.md
  optional_domain_evidence_schema: docs/rbp_depolymerase_schema.md
  optional_structural_evidence_schema: docs/rbp_depolymerase_schema.md

host_features:
  integration_script: scripts/04_integrate_host_features.py
  host_feature_schema: docs/host_feature_schema.md

defense_counterdefense:
  integration_script: scripts/05_integrate_defense_counterdefense.py
  defense_counterdefense_schema: docs/defense_counterdefense_schema.md
  optional_host_defense_schema: docs/defense_counterdefense_schema.md
  optional_phage_antidefense_schema: docs/defense_counterdefense_schema.md

model_comparison:
  comparison_script: scripts/06_compare_feature_models.py
  modeling_schema: docs/modeling_schema.md

figure_generation:
  figure_script: scripts/07_generate_figure_sources.py
  figure_generation_schema: docs/figure_generation_schema.md

workflow_validation:
  validation_script: scripts/08_validate_workflow.py
  workflow_validation_schema: docs/workflow_validation_schema.md

workflow_runner:
  runner_script: scripts/run_workflow.py
  runner_config: config/workflow.yaml
  smoke_test_config: config/workflow.mock.yaml
  runner_schema: docs/workflow_runner.md

production_evidence_status:
  manifest: data/metadata/production_evidence/production_tool_run_manifest.tsv
  tracked_normalized_evidence:
    - data/metadata/production_evidence/phagehostlearn_prodigal_cds_annotations.tsv
    - data/metadata/production_evidence/phagehostlearn_plus_prophage_cds_annotations.tsv
    - data/metadata/production_evidence/rbp_domain_evidence.tsv
    - data/metadata/production_evidence/rbp_structural_evidence.tsv
    - data/metadata/production_evidence/kaptive_ko_typing.tsv
    - data/metadata/production_evidence/kleborate_host_features.tsv
    - data/metadata/production_evidence/host_defense_systems.tsv
    - data/metadata/production_evidence/phage_antidefense_candidates.tsv
  local_generated_native_outputs:
    - results/production/pharokka_assay_phages/
    - results/production/phold_assay_phages/
    - results/production/host_defense/defensefinder/
  not_yet_run:
    - viridic
    - padloc

planned_tools:
  phage_annotation:
    primary: pharokka
    structure_informed: phold
  genome_similarity:
    species_like: viridic
    screening: mash
  host_annotation:
    klebsiella_screening: kleborate
    k_o_typing: kaptive
  defense_annotation:
    host_defense: defensefinder
    alternative_host_defense: padloc

notes:
  - The default workflow validates tracked normalized production evidence and does not require heavy external bioinformatics tools in CI.
  - Pharokka, Phold/Foldseek, Kaptive, Kleborate, and DefenseFinder are required to regenerate the current production evidence from raw inputs.
  - VIRIDIC and PADLOC remain not-yet-run for this repository; current similarity and defense evidence should not be described as VIRIDIC or PADLOC output.

tool_audit:
  default_version_timeout_seconds: 10
  tools:
    - tool_id: python
      stage: workflow_core
      purpose: run Python workflow scripts
      command: python
      version_args: ["--version"]
      required_for_current_workflow: true
      install_hint: conda environment from environment.yml
      notes: Required by the direct workflow runner.

    - tool_id: snakemake
      stage: workflow_core
      purpose: preferred workflow orchestration
      command: snakemake
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: mamba install -c bioconda snakemake
      notes: Optional locally because scripts/run_workflow.py is the validated fallback.

    - tool_id: mash
      stage: dereplication
      purpose: fast genome similarity screening
      command: mash
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: mamba install -c bioconda mash
      notes: Optional screening tool; current benchmark similarity evidence uses tracked BLASTN, fastANI, and skani tables, not Mash.

    - tool_id: viridic
      stage: dereplication
      purpose: intergenomic similarity for phage species-like clustering
      command: viridic
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: install/run VIRIDIC separately and provide pairwise TSV output
      notes: Not yet run for this repository; required only for future atlas-scale VIRIDIC similarity claims.

    - tool_id: pharokka
      stage: annotation_pangenome
      purpose: standardized bacteriophage annotation
      command: pharokka.py
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: mamba install -c bioconda pharokka
      notes: Local native Pharokka 1.9.1 runs completed for 105 assay phages; native outputs are under ignored results/production and tracked normalized evidence is summarized separately.

    - tool_id: phold
      stage: rbp_depolymerase
      purpose: structure-informed phage protein annotation
      command: phold
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: install Phold in a compatible environment and provide structural evidence TSV
      notes: Local Phold 1.2.5/Foldseek 10.941cd33 runs completed for 105 assay phages; tracked normalized receptor and ACR candidate subsets are configured as production evidence.

    - tool_id: kleborate
      stage: host_features
      purpose: Klebsiella species/ST/AMR/virulence annotation
      command: kleborate
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: mamba install -c bioconda kleborate
      notes: Tracked Kleborate 3.2.4 production evidence exists for 188 assay hosts; command availability is not required for CI validation of normalized evidence.

    - tool_id: kaptive
      stage: host_features
      purpose: Klebsiella K/O locus typing
      command: kaptive
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: mamba install -c bioconda kaptive
      notes: Tracked Kaptive 3.2.1 production evidence exists for 200 assay hosts; command availability is not required for CI validation of normalized evidence.

    - tool_id: defensefinder
      stage: defense_counterdefense
      purpose: bacterial defense system annotation
      command: defense-finder
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: install DefenseFinder and provide host defense TSV output
      notes: Tracked DefenseFinder 3.0.0 production evidence exists for 200 assay hosts; command availability is not required for CI validation of normalized evidence.

    - tool_id: padloc
      stage: defense_counterdefense
      purpose: alternative bacterial defense system annotation
      command: padloc
      version_args: ["--version"]
      required_for_current_workflow: false
      install_hint: install PADLOC separately and provide host defense TSV output
      notes: Alternative host-defense tool not yet run; current defense evidence is DefenseFinder only.

