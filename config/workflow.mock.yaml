extends: workflow.base.yaml
paths:
  results_dir: results/mock
  logs_dir: logs/mock
profile:
  name: mock
  description: Synthetic fixture workflow for offline CI and plumbing validation.
  evidence_class: synthetic_fixture
  requires_local_sequences: false
  requires_sequence_checksums: false
  requires_production_external_evidence: false
  allows_biological_claims: false
  results_directory: results/mock
  claim_scope: mock_fixture_only
source_queries:
  config: config/source_queries.mock.yaml
  catalog: config/source_catalog.mock.yaml
  imports_config: config/source_imports.mock.yaml
source_imports:
  config: config/source_imports.mock.yaml
source_plan:
  catalog: config/source_catalog.mock.yaml
  imports_config: config/source_imports.mock.yaml
source_audit:
  catalog: config/source_catalog.mock.yaml
sample_builder:
  catalog: config/source_catalog.mock.yaml
inputs:
  samples: '{results_dir}/source_builder/samples.tsv'
  pairwise_similarity: data/metadata/mock_pairwise_similarity.tsv
  annotation_input: data/metadata/mock_phage_annotations.tsv
  domain_evidence: data/metadata/mock_domain_evidence.tsv
  structural_evidence: data/metadata/mock_structural_evidence.tsv
  kleborate_input: data/metadata/mock_kleborate_results.tsv
  kaptive_input: data/metadata/mock_kaptive_results.tsv
  host_defense_input: data/metadata/mock_host_defense_systems.tsv
  phage_antidefense_input: data/metadata/mock_phage_antidefense.tsv
outputs:
  validation:
    workflow_config: config/workflow.mock.yaml
sequence_acquisition_manifest:
  manifest: data/metadata/mock_sequence_acquisition_manifest.tsv
